<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>TASK-1</title>
</head>
<body>
    <!-- main section -->
    <div class="container">
        <div class="main">
            <!-- slackDisplayImage -->
            <div class="image">
                <img src="./images/profile.jpeg" alt="Eteng Moses" data-testid="slackDisplayImage">
            </div>
            <!-- slackUserName -->
            <div class="name" >
                <p>NAME:</p>
                <p data-testid="slackUserName">ETENG MOSES</p>
            </div>
            <!-- currentDayOfTheWeek -->
            <div class="days">
                <p>Day:</p>
                <p class="day" data-testid="currentDayOfTheWeek" id="currentDay"></p>
            </div> 
            <!-- current time -->
            <div class="time">
                <p>Time:</p>
                <p data-testid="time" id="currentTime"></p>
            </div>
            <!-- Track -->
            <div class="track">
                <p>Track:</p>
                <p data-testid="myTrack">FrontEnd</p>
            </div>
            <!-- github-link -->
            <div class="github">
                <p>Github:</p>
                <a href="https://github.com/mosescode1/HNG-Task-1.git" data-testid=“githubURL”>Github-link</a>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
